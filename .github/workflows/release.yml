name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o llc-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: llc-${{ matrix.goos }}-${{ matrix.goarch }}

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/llc-*
          body: |
            ## llc v2.0.0 - Go Rewrite with Linux Support

            ### Installation

            ```bash
            # Linux AMD64
            curl -L -o llc https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/llc-linux-amd64
            chmod +x llc
            sudo mv llc /usr/local/bin/

            # macOS Apple Silicon
            curl -L -o llc https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/llc-darwin-arm64
            chmod +x llc
            sudo mv llc /usr/local/bin/
            ```

            ### Usage

            ```bash
            llc              # List current directory
            llc -a           # Show all files (including hidden)
            llc -h           # Human-readable sizes
            llc -e file.txt "comment"  # Set file comment
            ```

            ### Features

            - Cross-platform (Linux & macOS)
            - File comments via xattr
            - Colorized output
            - Multiple sorting options
            - Configuration file support (~/.llcrc)

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
